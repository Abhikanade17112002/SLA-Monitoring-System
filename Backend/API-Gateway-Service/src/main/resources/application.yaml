spring:
  application:
    name: API-Gateway-Service

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"    # exposes all actuator endpoints
  endpoint:
    health:
      show-details: always   # show detailed health info
